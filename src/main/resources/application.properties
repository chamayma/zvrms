# =========================
# APPLICATION
# =========================
spring.application.name=zvrms

server.port=8090

# =========================
# DATABASE
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/zvrms
spring.datasource.username=salma
spring.datasource.password=salma123
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================
# JWT
# =========================
jwt.secret=ZVRMSSecretKey2026ForJWTAuthenticationSystemVerySecure123456789
jwt.expiration=86400000

# =========================
# FILE UPLOAD
# =========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================
# LOGGING
# =========================
logging.level.org.springframework.security=DEBUG